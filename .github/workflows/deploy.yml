name: Deploy Whisper Worker to AWS ECR

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  # Pon aquí el NOMBRE EXACTO de tu repo en ECR que creaste en el Paso 5
  ECR_REPOSITORY: whisper-backend-worker 

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          # Estas keys deben estar en los Secrets de tu repositorio GitHub
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to Amazon ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          # Usamos 'latest' para que AWS Batch siempre encuentre la versión nueva fácilmente
          IMAGE_TAG: latest 
        run: |
          echo "🔨 Construyendo imagen Docker..."
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          
          echo "🚀 Subiendo imagen a ECR..."
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          
          echo "✅ Imagen subida exitosamente: $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"